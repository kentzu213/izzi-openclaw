name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Job 1: Build Go binaries for all platforms
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cd cli
          go build -ldflags "-s -w \
            -X main.Version=${VERSION} \
            -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -X main.GitCommit=${GITHUB_SHA::8}" \
            -o ../izzi-installer-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/izzi

      - uses: actions/upload-artifact@v4
        with:
          name: izzi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: izzi-installer-*

  # Job 2: Create release with binaries + scripts + checksums
  release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: |
          echo "=== Generating SHA256 checksums ==="
          sha256sum \
            install.ps1 install.sh install-vps.sh install.bat \
            fix.ps1 fix.sh fix.bat \
            startup.ps1 startup.bat \
            izzi-installer-* \
            > SHA256SUMS.txt
          echo ""
          echo "=== SHA256SUMS.txt ==="
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.ps1
            install.sh
            install-vps.sh
            install.bat
            fix.ps1
            fix.sh
            fix.bat
            startup.ps1
            startup.bat
            izzi-installer-*
            SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## 🔒 Compiled Binary Installer (Recommended)

            Pre-built binaries with debug info stripped.
            No source code exposure — install with a single command.

            ### Binary Installation
            ```bash
            # Download for your platform, then:
            chmod +x izzi-installer-*
            ./izzi-installer-linux-amd64 install izzi-YOUR_API_KEY
            ```

            | Platform | Binary |
            |----------|--------|
            | Windows x64 | `izzi-installer-windows-amd64.exe` |
            | macOS x64 | `izzi-installer-darwin-amd64` |
            | macOS ARM | `izzi-installer-darwin-arm64` |
            | Linux x64 | `izzi-installer-linux-amd64` |
            | Linux ARM | `izzi-installer-linux-arm64` |

            ## 📜 Script Installation (Legacy)

            ```bash
            # Linux/macOS
            curl -fsSL https://raw.githubusercontent.com/kentzu213/izzi-openclaw/main/install.sh | bash -s -- "izzi-YOUR_KEY"

            # PowerShell (Windows)
            irm https://raw.githubusercontent.com/kentzu213/izzi-openclaw/main/install.ps1 | iex
            ```

            ## 🔐 Integrity Verification

            ```bash
            sha256sum -c SHA256SUMS.txt
            # Or use the binary:
            ./izzi-installer-linux-amd64 verify
            ```
