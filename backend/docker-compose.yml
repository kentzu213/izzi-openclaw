services:
  api:
    build: .
    container_name: izzi-api
    network_mode: host
    env_file: .env
    environment:
      - NINEROUTER_BASE_URL=http://localhost:20128
      - ML_ROUTER_URL=http://localhost:8790
    restart: unless-stopped
    depends_on:
      ml-router:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ml-router:
    build: ./izzi-router
    container_name: izzi-ml-router
    network_mode: host
    env_file: .env
    environment:
      - RETRAIN_INTERVAL_HOURS=6
      - MIN_TRAINING_SAMPLES=100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8790/health').raise_for_status()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
