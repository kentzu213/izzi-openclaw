version: 2

builds:
  - id: izzi-installer
    dir: cli
    main: ./cmd/izzi
    binary: izzi
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.BuildTime={{.Date}}
      - -X main.GitCommit={{.ShortCommit}}
    gobinary: garble

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "izzi-installer-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "SHA256SUMS.txt"
  algorithm: sha256

release:
  github:
    owner: kentzu213
    name: izzi-openclaw
  name_template: "v{{.Version}} — Izzi OpenClaw Installer"
  body: |
    ## 🔒 Compiled Binary Installer

    Pre-built, obfuscated binaries for all platforms.
    No source code exposure — install with a single command.

    ### Quick Install
    ```bash
    # Download for your platform, then:
    ./izzi install izzi-YOUR_API_KEY
    ```

    ### Verify Integrity
    ```bash
    sha256sum -c SHA256SUMS.txt
    # Or:
    ./izzi verify
    ```

    ### Platform Binaries
    | Platform | File |
    |----------|------|
    | Windows x64 | `izzi-installer-windows-amd64.zip` |
    | macOS x64 | `izzi-installer-darwin-amd64.tar.gz` |
    | macOS ARM | `izzi-installer-darwin-arm64.tar.gz` |
    | Linux x64 | `izzi-installer-linux-amd64.tar.gz` |
    | Linux ARM | `izzi-installer-linux-arm64.tar.gz` |
